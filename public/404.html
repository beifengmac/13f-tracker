<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>13F Tracker</title>
  <script>
    // GitHub Pages SPA redirect: convert path to query string so index.html can restore it
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/13f-tracker/?p=' +
      encodeURIComponent(path.replace('/13f-tracker', '')) +
      (search ? '&q=' + encodeURIComponent(search) : '') +
      hash
    );
  </script>
</head>
<body></body>
</html>
