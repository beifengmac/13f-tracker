name: Update 13F Data

on:
  schedule:
    - cron: '0 12 10-20 2,5,8,11 *'
    - cron: '0 12 1 1,3,4,6,7,9,10,12 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest 13F data
        run: python scripts/fetch_13f.py --output src/data.json --quarters 4
      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/data.json && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT
      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(python -c "import json; print(json.load(open('src/data.json'))['generated'])")
          git add src/data.json
          git commit -m "data: update 13F holdings ($DATE)"
          git push
